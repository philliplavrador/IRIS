# Per-project IRIS config. Values here override the global configs/ files
# for this project only. Leave any section empty ({}) to inherit defaults.

name: null                 # filled in by `iris project new`
description: null          # filled in by `iris project new`
created_at: null           # ISO 8601, filled in by `iris project new`

# Optional overrides merged into cfg.paths / cfg.ops / cfg.globals.
# Example: ops_overrides: { butter_bandpass: { low_hz: 500 } }
paths_overrides: {}
ops_overrides: {}
globals_overrides: {}

# Free-form notes the analysis agent should respect for this project.
# Example: "Only use pyqplot for figures. Prefer narrow-band analyses."
agent_notes: null

# -- Behavior dials (see docs/iris-behavior.md) ----------------------------
# Autonomy level controls what IRIS may run without explicit approval.
#   low    — reads only (memory, history, log, cache lookups)
#   medium — reads + cheap profiling + cache-hit retrieval
#   high   — reads + profiling + re-execution of ops already run here
# Novel analyses are *always* proposed, regardless of level.
autonomy: medium

# Pushback domains control how IRIS flags concerns.
#   light     — one sentence, implement anyway
#   balanced  — flag, propose alternatives, ask before proceeding
#   rigorous  — refuse until user acknowledges or overrides in writing
pushback:
  statistical: balanced
  methodological: balanced
  interpretive: light

# Memory-system dials (see docs/iris-memory.md).
memory:
  pin_budget_tokens: 2000          # hard cap on pinned-slice size
  goals_active_max: 5              # max active goals in the pinned slice
  digest_retention_days: 90        # rollup sessions older than this
  recall_k_default: 5
  recall_recency_halflife_days: 30 # time-decay halflife for retrieval scoring
  use_user_memory: false           # opt-in to ~/.iris/user_memory/
