# Operation parameter defaults for the IRIS pipeline.
#
# Each top-level key is an op name. Inline kwargs in DSL strings
# (e.g. `butter_bandpass(low_hz=300)`) override these defaults.
#
# See docs/operations.md for the math behind every op.

butter_bandpass:
  low_hz: 350           # lower cutoff frequency (Hz)
  high_hz: 6000         # upper cutoff frequency (Hz)
  order: 10             # filter order (steepness of rolloff)
  zero_phase: true      # forward-backward filtering (no phase shift)

notch_filter:
  notch_freq_hz: 60.0   # fundamental frequency to reject (Hz)
  notch_q: 30.0         # quality factor (higher = narrower notch)
  harmonics: [1, 2, 3, 4, 5]   # which harmonics to filter (1 = 60 Hz, 2 = 120 Hz, ...)

saturation_mask:
  # Detection params
  min_run: 20           # consecutive flat samples to trigger detection
  eps_range: 1.0        # tolerance (uV) for "flat" vs first sample
  lookahead: 400        # samples to scan ahead when extending an episode
  recovery_eps: 5.0     # tolerance (uV) for lookahead recovery check
  pre_samples: 250      # extra samples to mask before each episode start
  # Single-channel params (MEATrace input)
  mode: cut_window      # fill_nan | fill_zeroes | cut_window
  scope: leading        # all | leading
  # Bank params (MEABank input)
  sync_cut: true        # align all channels to the same window start
  drop_saturated_pct: 0.30   # drop channels with leading saturation >= this fraction

saturation_survey:
  min_run: 20
  eps_range: 1.0
  lookahead: 400
  recovery_eps: 5.0
  pre_samples: 250
  scope: leading
  plot_type: histogram  # histogram | scatter | survival

amp_gain_correction:
  broadband_range_hz: [350, 3000]   # frequency range for broadband power envelope (Hz)
  nperseg: 16384        # STFT window size (samples) — formerly 4096*4
  noverlap: 16374       # STFT overlap (samples; null = nperseg // 2) — formerly 4096*4 - 10
  window: hann

baseline_correction:
  window_frames: 41     # sliding window size for percentile filter (frames)
  percentile: 20        # percentile used to estimate baseline

constant_rms:
  k: 5.0                # threshold multiplier (k * global RMS)
  min_spike_distance_ms: 1.0   # minimum gap between detected spikes (ms)

sliding_rms:
  k: 5.0                # threshold multiplier (k * local RMS)
  half_window_ms: 250.0 # half-width of sliding RMS window (ms)
  min_spike_distance_ms: 1.0
  min_nonzero_fraction: 0.2    # min fraction of non-zero samples in RMS window
  zero_eps: 1.0e-4      # absolute values below this treated as zero
  zero_buffer_ms: 0.0   # buffer around zero regions to also exclude (ms)

spike_pca:
  snippet_ms: 1.5       # waveform snippet duration centered on spike peak (ms)
  n_components: 3       # number of principal components
  outlier_std: 2.5      # std devs from centroid to flag as outlier
  min_spikes: 10        # minimum spikes required to run PCA

spike_curate:
  corr_threshold: 0.005 # min cross-correlation improvement to exclude a spike
  max_lag_ms: 500.0     # maximum cross-correlation lag (ms)

rt_detect:
  inference_scaling_numerator: 12.6   # numerator for IQR-based input scaling
  pre_median_frames: 1000             # samples for IQR estimate (null = full trace)

gcamp_sim:
  half_rise_ms: 80.0    # GCaMP rise half-life (ms)
  half_decay_ms: 500.0  # GCaMP decay half-life (ms)
  duration_ms: 2500.0   # kernel duration (ms)
  peak_dff: 0.20        # peak dF/F amplitude of kernel

sigmoid: {}             # logistic transform — no params

rt_thresh:
  threshold: 0.275      # sigmoid probability cutoff for spike detection

x_corr:
  max_lag_ms: 500.0     # maximum cross-correlation lag (ms)
  normalize: true       # z-score normalize signals before correlation
  adapt_circle_size: true   # scale circle size by electrode saturation %

freq_traces:
  freqs_hz: [60, 120, 300]
  broadband_range_hz: [350, 3000]
  nperseg: 16384        # formerly 4096*4
  noverlap: 16374       # formerly 4096*4 - 10
  window: hann

spectrogram:
  nperseg: 16384        # formerly 4096*4
  noverlap: null        # null = nperseg // 2
  window: hann
  scaling: density      # density | spectrum
  fmin: 0               # lower frequency bound for display (Hz)
  fmax: 360             # upper frequency bound for display (Hz)
  db_scale: true        # convert power to dB (10*log10)
