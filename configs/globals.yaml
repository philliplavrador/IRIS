# Global execution settings for the IRIS pipeline.

# --- Plot backend ---
#
# matplotlib         — static PNG via matplotlib.savefig (default, headless-safe)
# matplotlib_widget  — interactive ipympl widget for Jupyter notebooks
# pyqtgraph          — standalone desktop GUI window (live exploration)
# pyqplot            — publication-quality PDF/SVG via the qplot C++ binary
#                      (requires `pip install iris[publication]` AND the qplot
#                       binary on PATH — see https://github.com/wagenadl/qplot)
plot_backend: matplotlib

# --- Plot annotation ---

# Embed the operation chain + parameters as a panel beneath each figure.
show_ops_params: true

# Save every plot generated by a pipeline run to the active session output dir,
# along with a sidecar JSON file containing full provenance metadata.
save_plots: true

# --- Caching ---

# In-memory prefix-cache reuse within a single pipeline run. Cheap and almost
# always wanted; disable only when debugging the cache itself.
memory_cache: true

# Disk-persistent pickle cache across runs. Disable on Colab or when working
# with very large intermediate results that would fill the cache directory.
disk_cache: true

# --- Window default ---
#
# If `window_ms` is omitted, every section in pipeline_cfg must declare its own
# window directive (e.g. "window_ms[14487, 44352]" or "window_ms[full]").
#
# window_ms: full
# window_ms: [14487.05, 44352.95]
